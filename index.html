<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bảng Cửu Chương</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Montserrat:wght@400;700;800&family=Open+Sans:wght@400;700&family=Poppins:wght@400;700&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            keyframes: {
              wiggle: {
                '0%, 100%': { transform: 'rotate(-3deg)' },
                '50%': { transform: 'rotate(3deg)' },
              },
              popIn: {
                '0%': { opacity: '0', transform: 'scale(0.5)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              zoomIn: {
                '0%': { opacity: '0', transform: 'scale(0.9)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              slideLeft: {
                '0%': { opacity: '0', transform: 'translateX(20px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              slideDown: {
                '0%': { opacity: '0', transform: 'translateY(-20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              bounceIn: {
                 '0%': { transform: 'scale(0)' },
                 '50%': { transform: 'scale(1.2)' },
                 '100%': { transform: 'scale(1)' },
              },
              // Animation cho hiệu ứng click vào số
              clickShake: {
                '0%': { transform: 'scale(1)' },
                '25%': { transform: 'scale(1.2) rotate(-5deg)' },
                '50%': { transform: 'scale(1.2) rotate(5deg)' },
                '75%': { transform: 'scale(1.1) rotate(-3deg)' },
                '100%': { transform: 'scale(1) rotate(0deg)' },
              },
              // Animation rung lắc khi sai
              shake: {
                '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
              },
              scaleIn: {
                 '0%': { transform: 'scale(0.9)', opacity: 0 },
                 '100%': { transform: 'scale(1)', opacity: 1 }
              },
              // Animation lơ lửng cho nhân vật 3D
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            },
            animation: {
              wiggle: 'wiggle 1s ease-in-out infinite',
              popIn: 'popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
              fadeIn: 'fadeIn 0.5s ease-out forwards',
              zoomIn: 'zoomIn 0.5s ease-out forwards',
              slideLeft: 'slideLeft 0.5s ease-out forwards',
              slideDown: 'slideDown 0.5s ease-out forwards',
              bounceIn: 'bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards',
              clickShake: 'clickShake 0.4s ease-in-out',
              shake: 'shake 0.82s cubic-bezier(.36,.07,.19,.97) both',
              scaleIn: 'scaleIn 0.3s ease-out forwards',
              float: 'float 3s ease-in-out infinite',
            }
          }
        }
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
  }
}
</script>
</head>
  <body class="bg-slate-50">
    <div id="root"></div>
  </body>
</html>
